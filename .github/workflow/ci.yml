name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      # -------------------------------------------------
      # 1️⃣  Checkout repository
      # -------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2️⃣  Set up Python (needed for both uv & conda)
      # -------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # -------------------------------------------------
      # 3️⃣  Try UV installation (preferred)
      # -------------------------------------------------
      - name: Install uv
        id: install_uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      # -------------------------------------------------
      # 4️⃣  Install dependencies 
      # -------------------------------------------------
      - name: Install dependencies (uv)
        if: steps.install_uv.outcome == 'success'
        run: |
          uv sync --frozen --group dev --group docs
        env:
          UV_SYSTEM_PYTHON: "true"

      # -------------------------------------------------
      # 5️⃣  Run the test suite
      # -------------------------------------------------
      - name: Run tests
        run: |
          # If uv succeeded we already have the env activated
          # If we fell back to conda, the environment is already active
          pytest -vv

      # -------------------------------------------------
      # 6️⃣  Build documentation (fail on warnings)
      # -------------------------------------------------
      - name: Build docs with Sphinx
        run: |
          # Ensure Sphinx is installed (uv or conda will have installed it)
          uv run sphinx-build -W -b html docs/ docs/_build/html
        # -W turns warnings into errors, causing the step to fail
